<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>New Page</title>
    <meta name="description" content="New page created by assistant" />
    <style>
      :root { color-scheme: light dark; }
      html, body { height: 100%; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell,
          Noto Sans, Helvetica Neue, Arial, "Apple Color Emoji", "Segoe UI Emoji";
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background: Canvas;
        color: CanvasText;
      }
      .container {
        max-width: 760px;
        margin: 12vh auto;
        padding: 0 16px;
      }
      h1 { font-size: 2.25rem; margin: 0 0 0.5rem; }
      p.lead { font-size: 1.125rem; margin: 0 0 1.25rem; opacity: 0.8; }
      a.button {
        display: inline-block;
        padding: 10px 14px;
        border-radius: 10px;
        background: #1f6feb;
        color: white;
        text-decoration: none;
      }
      a.button:focus-visible { outline: 3px solid #ffbf47; outline-offset: 2px; }
      code { background: color-mix(in oklab, Canvas 85%, #888); padding: 0 6px; border-radius: 6px; }
    </style>
  </head>
  <body>
    <main class="container" role="main">
      <h1>New Page</h1>
      <p class="lead">This is a placeholder page. Edit <code>new-page.html</code> to customize it.</p>
    </main>
  </body>
</html>
